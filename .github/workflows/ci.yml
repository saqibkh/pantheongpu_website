name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    container:
      image: ubuntu:24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Bootstrap job container
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates git lsb-release tar gzip xz-utils zstd

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run Unit Tests
        run: python -m pytest

      - name: Generate Web Data
        run: python website_utils/generate_web_data.py

      - name: Ensure Generated Data Is Current
        run: |
          git diff --exit-code -- docs/assets/web_data.json || {
            echo "::error::docs/assets/web_data.json is not in sync with database/*.json. Run python website_utils/generate_web_data.py and commit the result."
            exit 1
          }

      - name: Build Docs
        run: python -m mkdocs build --strict

  uninstall-smoke:
    runs-on: [self-hosted, Linux, X64]
    container:
      image: ubuntu:24.04

    steps:
      - name: Bootstrap job container
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates curl git

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Test clean uninstall in isolated Ubuntu
        run: bash tests/test_uninstall_in_container.sh
