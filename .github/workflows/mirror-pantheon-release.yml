name: Mirror Pantheon Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Pantheon release tag to mirror, for example v1.0.8. Leave blank for latest."
        required: false
        type: string
      overwrite:
        description: "Delete and recreate the website release if it already exists."
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [pantheongpu_released]

permissions:
  contents: write

jobs:
  mirror-release:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve workflow options
        id: options
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          MANUAL_TAG: ${{ github.event.inputs.tag }}
          MANUAL_OVERWRITE: ${{ github.event.inputs.overwrite }}
        run: |
          set -euo pipefail

          tag="${MANUAL_TAG:-${DISPATCH_TAG:-}}"
          overwrite="${MANUAL_OVERWRITE:-false}"

          {
            echo "tag=${tag}"
            echo "overwrite=${overwrite}"
          } >> "$GITHUB_OUTPUT"

      - name: Check source repository token access
        env:
          GH_TOKEN: ${{ secrets.PANTHEON_SOURCE_REPO_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if ! gh api "repos/saqibkh/pantheongpu" >/dev/null 2>&1; then
            echo "Unable to read saqibkh/pantheongpu with the token available to this workflow."
            echo ""
            echo "If saqibkh/pantheongpu is private, add or replace the"
            echo "PANTHEON_SOURCE_REPO_TOKEN repository secret in pantheongpu_website."
            echo ""
            echo "Recommended token options:"
            echo "1. Fine-grained PAT owned by an account that can read saqibkh/pantheongpu:"
            echo "   - Repository access: Only saqibkh/pantheongpu"
            echo "   - Repository permissions: Contents = Read-only"
            echo "2. Classic PAT owned by an account that can read saqibkh/pantheongpu:"
            echo "   - Scope: repo"
            exit 1
          fi

      - name: Resolve source release
        id: source
        env:
          GH_TOKEN: ${{ secrets.PANTHEON_SOURCE_REPO_TOKEN || github.token }}
          INPUT_TAG: ${{ steps.options.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_TAG}" ]; then
            gh api "repos/saqibkh/pantheongpu/releases/tags/${INPUT_TAG}" > source-release.json
          else
            gh api "repos/saqibkh/pantheongpu/releases/latest" > source-release.json
          fi

          tag="$(jq -r '.tag_name // ""' source-release.json)"
          if [ -z "${tag}" ]; then
            echo "No source release found in saqibkh/pantheongpu."
            exit 1
          fi

          name="$(jq -r '.name // .tag_name' source-release.json)"
          prerelease="$(jq -r '.prerelease' source-release.json)"
          draft="$(jq -r '.draft' source-release.json)"

          {
            echo "tag=${tag}"
            echo "name=${name}"
            echo "prerelease=${prerelease}"
            echo "draft=${draft}"
          } >> "$GITHUB_OUTPUT"

          jq -r '.body // ""' source-release.json > release-notes.md

      - name: Download source release assets
        env:
          GH_TOKEN: ${{ secrets.PANTHEON_SOURCE_REPO_TOKEN || github.token }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          jq -r '
            .assets[]
            | select(.name | test("(\\.deb$)|(\\.tar\\.gz$)|(\\.zip$)|(^SHA256SUMS$)"))
            | [.id, .name]
            | @tsv
          ' source-release.json | while IFS=$'\t' read -r asset_id asset_name; do
            echo "Downloading ${asset_name}"
            gh api \
              -H "Accept: application/octet-stream" \
              "repos/saqibkh/pantheongpu/releases/assets/${asset_id}" \
              > "release-assets/${asset_name}"
          done

          find release-assets -maxdepth 1 -type f -print

      - name: Validate required assets
        run: |
          set -euo pipefail

          deb_count="$(find release-assets -maxdepth 1 -name '*.deb' | wc -l)"
          tar_count="$(find release-assets -maxdepth 1 -name '*.tar.gz' | wc -l)"
          zip_count="$(find release-assets -maxdepth 1 -name '*.zip' | wc -l)"

          if [ "${deb_count}" -lt 1 ]; then
            echo "Source release is missing a .deb asset."
            exit 1
          fi

          if [ "${tar_count}" -lt 1 ]; then
            echo "Source release is missing a .tar.gz asset."
            exit 1
          fi

          if [ "${zip_count}" -lt 1 ]; then
            echo "Source release is missing a .zip asset."
            exit 1
          fi

          for package in release-assets/*.deb; do
            dpkg-deb --info "${package}" >/dev/null
          done

          for archive in release-assets/*.tar.gz; do
            tar -tzf "${archive}" >/dev/null
          done

          for archive in release-assets/*.zip; do
            zip -T "${archive}" >/dev/null
          done

      - name: Reject source repository files in release bundles
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import sys
          import tarfile
          import zipfile

          blocked_exact = {"pantheon.py", "tuning.py", "monitor.py"}
          blocked_dirs = {".git", "kernels", "tests", "website_utils"}

          def is_blocked(name: str) -> bool:
              parts = name.replace("\\", "/").lstrip("./").split("/")
              return any(part in blocked_exact or part in blocked_dirs for part in parts)

          bad = []
          for archive in Path("release-assets").glob("*.tar.gz"):
              with tarfile.open(archive, "r:gz") as handle:
                  bad.extend(f"{archive.name}:{member.name}" for member in handle.getmembers() if is_blocked(member.name))

          for archive in Path("release-assets").glob("*.zip"):
              with zipfile.ZipFile(archive) as handle:
                  bad.extend(f"{archive.name}:{name}" for name in handle.namelist() if is_blocked(name))

          if bad:
              print("Release bundles include files from the private source repository:")
              for name in bad:
                  print(f"- {name}")
              sys.exit(1)
          PY

      - name: Check mirrored release status
        id: mirrored
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ steps.source.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing mirrored release
        if: ${{ steps.options.outputs.overwrite == 'true' && steps.mirrored.outputs.exists == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete "${{ steps.source.outputs.tag }}" --yes --cleanup-tag

      - name: Create mirrored website release
        if: ${{ steps.options.outputs.overwrite == 'true' || steps.mirrored.outputs.exists != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
          RELEASE_NAME: ${{ steps.source.outputs.name }}
          RELEASE_PRERELEASE: ${{ steps.source.outputs.prerelease }}
          RELEASE_DRAFT: ${{ steps.source.outputs.draft }}
        run: |
          set -euo pipefail

          args=()
          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ "${RELEASE_DRAFT}" = "true" ]; then
            args+=(--draft)
          fi

          gh release create "${RELEASE_TAG}" \
            release-assets/* \
            --title "${RELEASE_NAME}" \
            --notes-file release-notes.md \
            "${args[@]}"

      - name: Fetch website release list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" --jq '.[]' \
            | jq -s 'sort_by(.published_at // .created_at // "") | reverse' \
            > website-releases.json

      - name: Update website release page
        run: |
          set -euo pipefail
          python website_utils/update_release_page.py \
            --release-json source-release.json \
            --releases-json website-releases.json \
            --assets-dir release-assets \
            --output docs/release.md \
            --repo "${GITHUB_REPOSITORY}"

      - name: Commit release page update
        env:
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- docs/release.md; then
            echo "docs/release.md is already current for ${RELEASE_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/release.md
          git commit -m "Update release page for ${RELEASE_TAG}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Install website dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Verify website
        run: |
          python -m pytest
          python website_utils/generate_web_data.py
          git diff --exit-code -- docs/assets/web_data.json
          python -m mkdocs build --strict

      - name: Deploy website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
