name: Publish Website

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    container:
      image: ubuntu:24.04
    steps:
      - name: Bootstrap job container
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates git lsb-release tar gzip xz-utils zstd

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run Unit Tests
        run: python -m pytest

      - name: Generate Web Data
        run: python website_utils/generate_web_data.py

      - name: Ensure Generated Data Is Current
        run: |
          git -C "${GITHUB_WORKSPACE}" diff --exit-code -- docs/assets/web_data.json || {
            echo "::error::docs/assets/web_data.json is not in sync with database/*.json. Run python website_utils/generate_web_data.py and commit the result."
            exit 1
          }

      - name: Build Docs
        run: python -m mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
